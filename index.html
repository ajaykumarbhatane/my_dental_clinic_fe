<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Website Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="/src/assets/mydentalclinicpro_logo.png"
    />

    <!-- Mobile Icon -->
    <link
      rel="apple-touch-icon"
      href="/src/assets/mydentalclinicpro_logo.png"
    />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Title -->
    <title>My Dental Clinic Pro</title>

    <!-- SEO Description -->
    <meta
      name="description"
      content="Professional dental clinic management system for dentists and clinics."
    />

    <!-- Keywords -->
    <meta
      name="keywords"
      content="Dental Clinic, Dental Management, Dentist Software, Clinic Management System"
    />

    <!-- Theme Color -->
    <meta name="theme-color" content="#2563eb" />

    <!-- Open Graph -->
    <meta property="og:title" content="My Dental Clinic Pro" />
    <meta
      property="og:description"
      content="Professional dental clinic management system."
    />
    <meta
      property="og:image"
      content="/src/assets/mydentalclinicpro_logo.png"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mydentalclinicpro.com" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="My Dental Clinic Pro" />
    <meta
      name="twitter:description"
      content="Professional dental clinic management system."
    />
    <meta
      name="twitter:image"
      content="/src/assets/mydentalclinicpro_logo.png"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "My Dental Clinic Pro",
        "url": "https://mydentalclinicpro.com",
        "logo": "https://mydentalclinicpro.com/src/assets/mydentalclinicpro_logo.png"
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
